name: Create Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Show project files before wrapper generation
        shell: bash
        run: |
          echo "=== ROOT ==="
          ls -lah
          echo "=== gradle/wrapper before ==="
          ls -lah gradle/wrapper || true

      - name: Create missing Gradle wrapper files
        shell: bash
        run: |
          set -e

          mkdir -p gradle/wrapper

          gradle wrapper --gradle-version 8.2 --no-daemon

          chmod +x gradlew || true

          echo "=== gradle/wrapper after ==="
          ls -lah gradle/wrapper
          echo "=== wrapper files ==="
          ls -lah gradlew gradlew.bat

          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          test -f gradlew
          test -f gradlew.bat

      - name: Commit wrapper files back to repo
        shell: bash
        run: |
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties

          if git diff --cached --quiet; then
            echo "No wrapper changes to commit"
            exit 0
          fi

          git commit -m 'Add Gradle wrapper files'
          git push
