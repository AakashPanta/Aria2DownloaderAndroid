name: Fix aria2 RPC Port Conflict

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-rpc-port:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace aria2 runtime and RPC files
        shell: bash
        run: |
          set -e

          mkdir -p app/src/main/java/com/aria2/downloader/domain/engine

          cat > app/src/main/java/com/aria2/downloader/domain/engine/Aria2Runtime.kt <<'EOF'
          package com.aria2.downloader.domain.engine

          object Aria2Runtime {
              const val DEFAULT_RPC_PORT: Int = 6800
              val RPC_PORT_RANGE: IntRange = 6800..6810

              @Volatile
              var rpcPort: Int = DEFAULT_RPC_PORT
          }
          EOF

          cat > app/src/main/java/com/aria2/downloader/domain/engine/Aria2RpcClient.kt <<'EOF'
          package com.aria2.downloader.domain.engine

          import android.util.Base64
          import com.aria2.downloader.data.preferences.SettingsRepository
          import com.aria2.downloader.domain.model.DownloadSourceType
          import com.aria2.downloader.domain.model.DownloadStatus
          import java.io.File
          import javax.inject.Inject
          import javax.inject.Singleton
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import okhttp3.MediaType.Companion.toMediaType
          import okhttp3.Request
          import okhttp3.RequestBody.Companion.toRequestBody
          import okhttp3.OkHttpClient
          import org.json.JSONArray
          import org.json.JSONObject

          @Singleton
          class Aria2RpcClient @Inject constructor(
              private val okHttpClient: OkHttpClient,
              private val settingsRepository: SettingsRepository
          ) {
              suspend fun isAvailable(): Boolean {
                  val currentPort = Aria2Runtime.rpcPort
                  if (isAvailableOnPort(currentPort)) {
                      return true
                  }

                  for (port in Aria2Runtime.RPC_PORT_RANGE) {
                      if (port == currentPort) continue
                      if (isAvailableOnPort(port)) {
                          Aria2Runtime.rpcPort = port
                          return true
                      }
                  }
                  return false
              }

              suspend fun isAvailableOnPort(port: Int): Boolean =
                  runCatching {
                      getVersionOnPort(port)
                      Aria2Runtime.rpcPort = port
                      true
                  }.getOrDefault(false)

              suspend fun getVersion(): String = withContext(Dispatchers.IO) {
                  call("aria2.getVersion", emptyList()).getJSONObject("result").getString("version")
              }

              private suspend fun getVersionOnPort(port: Int): String = withContext(Dispatchers.IO) {
                  call("aria2.getVersion", emptyList(), port).getJSONObject("result").getString("version")
              }

              suspend fun addUri(uri: String, options: Map<String, String>): String = withContext(Dispatchers.IO) {
                  call("aria2.addUri", listOf(listOf(uri), options)).getString("result")
              }

              suspend fun addTorrent(fileBytes: ByteArray, options: Map<String, String>): String = withContext(Dispatchers.IO) {
                  val encoded = Base64.encodeToString(fileBytes, Base64.NO_WRAP)
                  call("aria2.addTorrent", listOf(encoded, emptyList<String>(), options)).getString("result")
              }

              suspend fun addMetalink(fileBytes: ByteArray, options: Map<String, String>): List<String> = withContext(Dispatchers.IO) {
                  val encoded = Base64.encodeToString(fileBytes, Base64.NO_WRAP)
                  val result = call("aria2.addMetalink", listOf(encoded, options)).getJSONArray("result")
                  (0 until result.length()).map { result.getString(it) }
              }

              suspend fun pause(gid: String) {
                  call("aria2.pause", listOf(gid))
              }

              suspend fun unpause(gid: String) {
                  call("aria2.unpause", listOf(gid))
              }

              suspend fun forceRemove(gid: String) {
                  call("aria2.forceRemove", listOf(gid))
              }

              suspend fun changeOption(gid: String, options: Map<String, String>) {
                  call("aria2.changeOption", listOf(gid, options))
              }

              suspend fun changeGlobalOption(options: Map<String, String>) {
                  call("aria2.changeGlobalOption", listOf(options))
              }

              suspend fun changePosition(gid: String, pos: Int, how: String): Int = withContext(Dispatchers.IO) {
                  call("aria2.changePosition", listOf(gid, pos, how)).getInt("result")
              }

              suspend fun tellStatus(gid: String): Aria2Task = withContext(Dispatchers.IO) {
                  parseTask(call("aria2.tellStatus", listOf(gid, STATUS_KEYS)).getJSONObject("result"))
              }

              suspend fun tellActive(): List<Aria2Task> = withContext(Dispatchers.IO) {
                  val result = call("aria2.tellActive", listOf(STATUS_KEYS)).getJSONArray("result")
                  parseTasks(result)
              }

              suspend fun tellWaiting(offset: Int = 0, num: Int = 100): List<Aria2Task> = withContext(Dispatchers.IO) {
                  val result = call("aria2.tellWaiting", listOf(offset, num, STATUS_KEYS)).getJSONArray("result")
                  parseTasks(result)
              }

              suspend fun tellStopped(offset: Int = 0, num: Int = 100): List<Aria2Task> = withContext(Dispatchers.IO) {
                  val result = call("aria2.tellStopped", listOf(offset, num, STATUS_KEYS)).getJSONArray("result")
                  parseTasks(result)
              }

              suspend fun shutdown() {
                  runCatching { call("aria2.shutdown", emptyList()) }
              }

              private suspend fun call(
                  method: String,
                  params: List<Any?>,
                  portOverride: Int? = null
              ): JSONObject = withContext(Dispatchers.IO) {
                  val settings = settingsRepository.currentSettings()
                  val port = portOverride ?: Aria2Runtime.rpcPort

                  val payload = JSONObject().apply {
                      put("jsonrpc", "2.0")
                      put("id", System.currentTimeMillis().toString())
                      put("method", method)
                      put("params", buildParams(settings.rpcToken, params))
                  }

                  val request = Request.Builder()
                      .url("http://127.0.0.1:$port/jsonrpc")
                      .post(payload.toString().toRequestBody("application/json; charset=utf-8".toMediaType()))
                      .build()

                  okHttpClient.newCall(request).execute().use { response ->
                      val body = response.body?.string().orEmpty()
                      if (!response.isSuccessful) {
                          throw IllegalStateException("aria2 RPC HTTP ${response.code}: $body")
                      }
                      val json = JSONObject(body)
                      if (json.has("error")) {
                          val error = json.getJSONObject("error")
                          throw IllegalStateException(error.optString("message", "Unknown aria2 RPC error"))
                      }
                      json
                  }
              }

              private fun buildParams(token: String, params: List<Any?>): JSONArray {
                  val array = JSONArray()
                  array.put("token:$token")
                  params.forEach { array.put(toJsonValue(it)) }
                  return array
              }

              private fun toJsonValue(value: Any?): Any? = when (value) {
                  null -> JSONObject.NULL
                  is Map<*, *> -> JSONObject().apply { value.forEach { (k, v) -> put(k.toString(), toJsonValue(v)) } }
                  is List<*> -> JSONArray().apply { value.forEach { put(toJsonValue(it)) } }
                  is Array<*> -> JSONArray().apply { value.forEach { put(toJsonValue(it)) } }
                  else -> value
              }

              private fun parseTasks(array: JSONArray): List<Aria2Task> = (0 until array.length()).map {
                  parseTask(array.getJSONObject(it))
              }

              private fun parseTask(json: JSONObject): Aria2Task {
                  val files = json.optJSONArray("files")
                  val firstFile = files?.optJSONObject(0)
                  val path = firstFile?.optString("path").orEmpty()
                  val firstUri = firstFile?.optJSONArray("uris")?.optJSONObject(0)?.optString("uri").orEmpty()
                  val bittorrent = json.optJSONObject("bittorrent")
                  val info = bittorrent?.optJSONObject("info")
                  val name = when {
                      path.isNotBlank() -> File(path).name
                      info?.optString("name").orEmpty().isNotBlank() -> info?.optString("name").orEmpty()
                      firstUri.startsWith("magnet:?") -> firstUri.substringAfter("dn=").substringBefore("&").ifBlank { "Torrent metadata" }
                      else -> "download-${json.optString("gid")}"
                  }

                  val sourceType = when {
                      firstUri.startsWith("magnet:?") -> DownloadSourceType.MAGNET
                      firstUri.endsWith(".torrent", ignoreCase = true) || bittorrent != null -> DownloadSourceType.TORRENT
                      firstUri.endsWith(".meta4", ignoreCase = true) || firstUri.endsWith(".metalink", ignoreCase = true) -> DownloadSourceType.METALINK
                      else -> DownloadSourceType.DIRECT
                  }

                  val status = when (json.optString("status")) {
                      "active" -> if (json.optString("followedBy").isNotBlank()) DownloadStatus.METADATA else DownloadStatus.DOWNLOADING
                      "waiting" -> DownloadStatus.QUEUED
                      "paused" -> DownloadStatus.PAUSED
                      "complete" -> DownloadStatus.COMPLETED
                      "error" -> DownloadStatus.FAILED
                      "removed" -> DownloadStatus.CANCELLED
                      else -> DownloadStatus.QUEUED
                  }

                  return Aria2Task(
                      gid = json.optString("gid"),
                      source = firstUri.ifBlank { path },
                      fileName = name,
                      sourceType = sourceType,
                      savePath = path,
                      totalLength = json.optString("totalLength").toLongOrNull() ?: 0L,
                      completedLength = json.optString("completedLength").toLongOrNull() ?: 0L,
                      downloadSpeed = json.optString("downloadSpeed").toLongOrNull() ?: 0L,
                      uploadSpeed = json.optString("uploadSpeed").toLongOrNull() ?: 0L,
                      connections = json.optString("connections").toIntOrNull() ?: 0,
                      status = status,
                      errorCode = json.optString("errorCode").takeIf { it.isNotBlank() },
                      errorMessage = json.optString("errorMessage").takeIf { it.isNotBlank() },
                      selectedFiles = json.optString("selectedFiles").takeIf { it.isNotBlank() },
                      infoHash = json.optString("infoHash").takeIf { it.isNotBlank() },
                      following = json.optString("followedBy").takeIf { it.isNotBlank() }
                  )
              }

              data class Aria2Task(
                  val gid: String,
                  val source: String,
                  val fileName: String,
                  val sourceType: DownloadSourceType,
                  val savePath: String,
                  val totalLength: Long,
                  val completedLength: Long,
                  val downloadSpeed: Long,
                  val uploadSpeed: Long,
                  val connections: Int,
                  val status: DownloadStatus,
                  val errorCode: String?,
                  val errorMessage: String?,
                  val selectedFiles: String?,
                  val infoHash: String?,
                  val following: String?
              )

              companion object {
                  private val STATUS_KEYS = listOf(
                      "gid",
                      "status",
                      "totalLength",
                      "completedLength",
                      "downloadSpeed",
                      "uploadSpeed",
                      "connections",
                      "files",
                      "bittorrent",
                      "errorCode",
                      "errorMessage",
                      "selectedFiles",
                      "infoHash",
                      "followedBy"
                  )
              }
          }
          EOF

          cat > app/src/main/java/com/aria2/downloader/domain/engine/Aria2ProcessManager.kt <<'EOF'
          package com.aria2.downloader.domain.engine

          import android.content.Context
          import android.os.Build
          import com.aria2.downloader.data.preferences.SettingsRepository
          import com.aria2.downloader.domain.model.AppSettings
          import dagger.hilt.android.qualifiers.ApplicationContext
          import java.io.File
          import java.net.ServerSocket
          import javax.inject.Inject
          import javax.inject.Singleton
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.sync.Mutex
          import kotlinx.coroutines.sync.withLock
          import kotlinx.coroutines.withContext

          @Singleton
          class Aria2ProcessManager @Inject constructor(
              @ApplicationContext private val context: Context,
              private val settingsRepository: SettingsRepository,
              private val rpcClient: Aria2RpcClient
          ) {
              @Volatile
              private var process: Process? = null

              private val processMutex = Mutex()

              private val stagingDirectory: File
                  get() = File(
                      context.getExternalFilesDir(android.os.Environment.DIRECTORY_DOWNLOADS),
                      "Aria2Downloads"
                  ).apply { mkdirs() }

              fun resolveDownloadDirectory(settings: AppSettings): File {
                  return if (settings.downloadLocationUri == null) {
                      File(settings.downloadLocationPath).apply { mkdirs() }
                  } else {
                      stagingDirectory
                  }
              }

              suspend fun ensureRunning() = withContext(Dispatchers.IO) {
                  processMutex.withLock {
                      if (rpcClient.isAvailable()) {
                          return@withLock
                      }

                      val reusablePort = findReusableRpcPort()
                      if (reusablePort != null) {
                          Aria2Runtime.rpcPort = reusablePort
                          return@withLock
                      }

                      val binary = resolveBundledBinary()
                      val wrapper = installWrapper(binary)
                      val settings = settingsRepository.currentSettings()
                      val targetDownloadDir = resolveDownloadDirectory(settings)

                      if (process?.isAlive == true) {
                          process?.destroy()
                          process = null
                          delay(300)
                          val revivedPort = findReusableRpcPort()
                          if (revivedPort != null) {
                              Aria2Runtime.rpcPort = revivedPort
                              return@withLock
                          }
                      }

                      val homeDir = File(context.filesDir, "aria2/home").apply { mkdirs() }
                      val sessionFile = File(homeDir, "session.txt").apply {
                          if (!exists()) createNewFile()
                      }
                      val logFile = File(homeDir, "aria2.log").apply {
                          if (!exists()) createNewFile()
                      }

                      var lastErrorText = ""

                      for (port in Aria2Runtime.RPC_PORT_RANGE) {
                          if (!canBind(port)) continue

                          val aria2Args = mutableListOf(
                              "--enable-rpc=true",
                              "--rpc-listen-all=false",
                              "--rpc-listen-port=$port",
                              "--rpc-secret=${settings.rpcToken}",
                              "--dir=${targetDownloadDir.absolutePath}",
                              "--continue=true",
                              "--auto-file-renaming=true",
                              "--allow-overwrite=false",
                              "--max-concurrent-downloads=${settings.maxConcurrentDownloads}",
                              "--split=${settings.split}",
                              "--max-connection-per-server=${settings.maxConnectionPerServer}",
                              "--min-split-size=${settings.minSplitSizeMb}M",
                              "--file-allocation=none",
                              "--summary-interval=0",
                              "--disk-cache=16M",
                              "--enable-dht=${settings.enableDht}",
                              "--enable-peer-exchange=${settings.peerExchange}",
                              "--bt-enable-lpd=${settings.localPeerDiscovery}",
                              "--bt-require-crypto=${settings.requireEncryption}",
                              "--follow-torrent=true",
                              "--follow-metalink=true",
                              "--bt-save-metadata=true",
                              "--rpc-save-upload-metadata=true",
                              "--save-session=${sessionFile.absolutePath}",
                              "--input-file=${sessionFile.absolutePath}",
                              "--save-session-interval=30",
                              "--seed-time=0",
                              "--log=${logFile.absolutePath}",
                              "--stop-with-process=${android.os.Process.myPid()}"
                          )

                          val command = mutableListOf("/system/bin/sh", wrapper.absolutePath).apply {
                              addAll(aria2Args)
                          }

                          process = ProcessBuilder(command)
                              .directory(homeDir)
                              .redirectErrorStream(true)
                              .redirectOutput(ProcessBuilder.Redirect.appendTo(logFile))
                              .start()

                          for (i in 0 until 40) {
                              if (rpcClient.isAvailableOnPort(port)) {
                                  Aria2Runtime.rpcPort = port
                                  return@withLock
                              }

                              val exited = runCatching { process?.exitValue() }.getOrNull()
                              if (exited != null) {
                                  break
                              }

                              delay(250)
                          }

                          val logTail = runCatching {
                              logFile.takeIf { it.exists() }
                                  ?.readText()
                                  ?.takeLast(4000)
                                  ?.trim()
                                  .orEmpty()
                          }.getOrDefault("")

                          lastErrorText = logTail

                          val reusableAfterFailure = findReusableRpcPort()
                          if (reusableAfterFailure != null) {
                              Aria2Runtime.rpcPort = reusableAfterFailure
                              return@withLock
                          }
                      }

                      throw IllegalStateException(
                          buildString {
                              append("aria2 daemon did not start")
                              if (lastErrorText.isNotBlank()) {
                                  append(". Log: ")
                                  append(lastErrorText)
                              } else {
                                  append(". No free RPC port found in range ${Aria2Runtime.RPC_PORT_RANGE.first}..${Aria2Runtime.RPC_PORT_RANGE.last}.")
                              }
                          }
                      )
                  }
              }

              suspend fun stop() = withContext(Dispatchers.IO) {
                  processMutex.withLock {
                      runCatching { rpcClient.shutdown() }
                      process?.destroy()
                      process = null
                  }
              }

              private suspend fun findReusableRpcPort(): Int? {
                  for (port in Aria2Runtime.RPC_PORT_RANGE) {
                      if (rpcClient.isAvailableOnPort(port)) {
                          return port
                      }
                  }
                  return null
              }

              private fun canBind(port: Int): Boolean {
                  return runCatching {
                      ServerSocket(port).use { socket ->
                          socket.reuseAddress = true
                      }
                      true
                  }.getOrDefault(false)
              }

              private fun resolveBundledBinary(): File {
                  require(
                      Build.SUPPORTED_ABIS.any { it.equals("arm64-v8a", ignoreCase = true) }
                  ) { "This build currently supports arm64-v8a only." }

                  val libDir = File(context.applicationInfo.nativeLibraryDir)
                  val binary = File(libDir, "libaria2c.so")

                  require(binary.exists()) {
                      "Bundled aria2 binary not found at ${binary.absolutePath}"
                  }

                  binary.setExecutable(true)
                  return binary
              }

              private fun installWrapper(binary: File): File {
                  val wrapper = File(context.filesDir, "aria2/bin/aria2-wrapper.sh")
                  wrapper.parentFile?.mkdirs()

                  val script = """
                      |#!/system/bin/sh
                      |ARIA2_BIN="${binary.absolutePath}"
                      |DNS1="${'$'}(getprop net.dns1)"
                      |DNS2="${'$'}(getprop net.dns2)"
                      |if [ -d /etc/security/cacerts ]; then
                      |  cat /etc/security/cacerts/* | "${'$'}ARIA2_BIN" \
                      |    --ca-certificate=/proc/self/fd/0 \
                      |    --async-dns \
                      |    --async-dns-server="${'$'}{DNS1},${'$'}{DNS2}" \
                      |    "${'$'}@"
                      |else
                      |  "${'$'}ARIA2_BIN" "${'$'}@"
                      |fi
                  """.trimMargin()

                  if (!wrapper.exists() || wrapper.readText() != script) {
                      wrapper.writeText(script)
                  }

                  wrapper.setReadable(true, true)
                  wrapper.setWritable(true, true)
                  wrapper.setExecutable(true, true)
                  return wrapper
              }
          }
          EOF

      - name: Show changed files
        shell: bash
        run: |
          echo "=== CHANGED FILES ==="
          git status --short

      - name: Commit and push fix
        shell: bash
        run: |
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add \
            app/src/main/java/com/aria2/downloader/domain/engine/Aria2Runtime.kt \
            app/src/main/java/com/aria2/downloader/domain/engine/Aria2RpcClient.kt \
            app/src/main/java/com/aria2/downloader/domain/engine/Aria2ProcessManager.kt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m 'Fix aria2 RPC port conflict by scanning and reusing ports'
          git push
