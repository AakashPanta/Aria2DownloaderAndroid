name: Build APK Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        run: |
          unzip -o Aria2DownloaderAndroid_updated.zip -d project
          echo "=== Extracted files ==="
          find project -maxdepth 3 | sed 's#^#- #'

      - name: Find gradlew
        run: |
          echo "=== Searching for gradlew ==="
          find . -name gradlew

      - name: Move extracted project contents correctly
        run: |
          PROJECT_DIR=$(find project -name gradlew -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR"
          if [ -z "$PROJECT_DIR" ]; then
            echo "gradlew not found"
            exit 1
          fi
          shopt -s dotglob
          cp -r "$PROJECT_DIR"/* .
          ls -lah

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Fix gradle.properties for Java 17
        run: |
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
            echo "=== gradle.properties ==="
            cat gradle.properties
          fi

      - name: Clean
        run: ./gradlew clean

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
