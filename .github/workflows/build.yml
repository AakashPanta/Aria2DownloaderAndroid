name: Build APK FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        run: |
          unzip -o Aria2DownloaderAndroid_updated.zip -d project
          find project -maxdepth 3

      - name: Find gradlew
        run: find . -name gradlew

      - name: Move project correctly
        run: |
          PROJECT_DIR=$(find project -name gradlew -exec dirname {} \; | head -n 1)
          shopt -s dotglob
          cp -r "$PROJECT_DIR"/* .

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      # 🔥 FIX 1: Gradle compatibility
      - name: Force Gradle version
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip#g' gradle/wrapper/gradle-wrapper.properties
            cat gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔥 FIX 2: Remove deprecated JVM flag
      - name: Fix gradle.properties
        run: |
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
            cat gradle.properties
          fi

      - name: Clean
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
