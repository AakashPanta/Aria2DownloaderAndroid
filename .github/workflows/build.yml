name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Force Gradle wrapper version
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip#g' gradle/wrapper/gradle-wrapper.properties
            cat gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show versions
        run: |
          echo "=== gradle.properties ==="
          cat gradle.properties
          echo "=== libs.versions.toml ==="
          cat gradle/libs.versions.toml

      - name: Clean
        run: ./gradlew clean --stacktrace --no-configuration-cache

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
