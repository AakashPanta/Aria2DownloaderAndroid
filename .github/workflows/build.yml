name: Build APK FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        run: unzip -o Aria2DownloaderAndroid_updated.zip -d project

      - name: Move project
        run: |
          PROJECT_DIR=$(find project -name gradlew -exec dirname {} \; | head -n 1)
          shopt -s dotglob
          cp -r "$PROJECT_DIR"/* .

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      # Fix Gradle version
      - run: |
          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip#g' gradle/wrapper/gradle-wrapper.properties

      - run: chmod +x ./gradlew

      # Fix JVM issue
      - run: sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties || true

      # 🔥 FINAL FIX
      - name: Fix Kotlin compatibility
        run: |
          echo "org.gradle.unsafe.configuration-cache=false" >> gradle.properties
          find . -name "*.gradle.kts" -exec sed -i 's/kotlin(".*")/kotlin("1.9.22")/g' {} +
          if [ -f gradle/libs.versions.toml ]; then
            sed -i 's/kotlin = ".*"/kotlin = "1.9.22"/g' gradle/libs.versions.toml
          fi

      - run: ./gradlew clean

      - run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
