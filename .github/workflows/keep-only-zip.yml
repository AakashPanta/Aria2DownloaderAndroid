name: Keep Only ZIP and Workflows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show files before cleanup
        shell: bash
        run: |
          echo "=== BEFORE CLEANUP ==="
          find . -maxdepth 4 | sed 's#^#- #'

      - name: Delete everything except ZIP and .github/workflows
        shell: bash
        run: |
          set -e

          ZIP_FILE="Aria2DownloaderAndroid_updated.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ZIP file not found: $ZIP_FILE"
            exit 1
          fi

          find . -mindepth 1 \
            ! -path "./.git" \
            ! -path "./.git/*" \
            ! -path "./.github" \
            ! -path "./.github/workflows" \
            ! -path "./.github/workflows/*" \
            ! -name "$ZIP_FILE" \
            -exec rm -rf {} +

      - name: Show files after cleanup
        shell: bash
        run: |
          echo "=== AFTER CLEANUP ==="
          find . -maxdepth 4 | sed 's#^#- #'

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Delete everything except ZIP and workflows" || echo "No changes to commit"
          git push
