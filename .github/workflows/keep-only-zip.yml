name: Keep Only Workflows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show files before cleanup
        shell: bash
        run: |
          echo "=== BEFORE CLEANUP ==="
          find . -maxdepth 4 | sed 's#^#- #'

      - name: Delete everything except .github/workflows
        shell: bash
        run: |
          set -e

          # Delete everything at repo root except .git and .github
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            -exec rm -rf {} +

          # Inside .github, delete everything except workflows
          find .github -mindepth 1 -maxdepth 1 \
            ! -name "workflows" \
            -exec rm -rf {} +

          # Optional safety check
          if [ ! -d ".github/workflows" ]; then
            echo ".github/workflows folder is missing"
            exit 1
          fi

      - name: Show files after cleanup
        shell: bash
        run: |
          echo "=== AFTER CLEANUP ==="
          find . -maxdepth 4 | sed 's#^#- #'

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[
